<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Markdown Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

<style>

body{
  margin:0;
  font-family: system-ui;
  background:#f6f8fa;
}

#layout{
  display:flex;
  max-width:1400px;
  margin:auto;
}

#toc{
  width:260px;
  padding:20px;
  border-right:1px solid #ddd;
  height:100vh;
  overflow:auto;
  background:white;
}

#toc a{
  display:block;
  font-size:14px;
  text-decoration:none;
  margin:6px 0;
  color:#0366d6;
}

#content{
  flex:1;
  padding:40px;
}

.markdown-body{
  background:white;
  padding:40px;
  border-radius:8px;
}

button{
  position:fixed;
  top:20px;
  right:20px;
  padding:8px 12px;
  cursor:pointer;
}

.dark{
  background:#0d1117;
}

.dark .markdown-body{
  background:#0d1117;
  color:#c9d1d9;
}

.dark #toc{
  background:#161b22;
  color:#c9d1d9;
}

.dark a{
  color:#58a6ff;
}

</style>
</head>

<body>

<button onclick="toggleDark()">🌙</button>

<div id="layout">

<div id="toc">
<b>Contents</b>
<div id="toc-list"></div>
</div>

<div id="content">
<article class="markdown-body" id="md"></article>
</div>

</div>

<script>

function getParam(name){
 return new URLSearchParams(location.search).get(name);
}

const mdUrl = getParam("md");

if(!mdUrl){
 document.getElementById("md").innerHTML =
 "No markdown URL provided.";
 throw "";
}

marked.setOptions({
 highlight:function(code,lang){
   return hljs.highlightAuto(code).value;
 }
});

fetch(mdUrl)
.then(r=>r.text())
.then(md=>{

 const html = marked.parse(md);
 const container = document.getElementById("md");

 container.innerHTML = html;

 generateTOC();

 hljs.highlightAll();

});

function generateTOC(){

 const headers =
 document.querySelectorAll("#md h1,#md h2,#md h3");

 const toc = document.getElementById("toc-list");

 headers.forEach((h,i)=>{

   const id = "h-"+i;

   h.id = id;

   const a = document.createElement("a");

   a.href = "#"+id;
   a.textContent = h.innerText;

   a.style.marginLeft =
     (parseInt(h.tagName[1])-1)*12+"px";

   toc.appendChild(a);

 });

}

function toggleDark(){

 document.body.classList.toggle("dark");

}

</script>

</body>
</html>
